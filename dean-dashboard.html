function CompBar({g,r,n,total,h=6}){const gP=(g/total)*100,rP=(r/total)*100,nP=(n/total)*100;return(<div style={{display:"flex",width:"100%",height:h,borderRadius:h/2,overflow:"hidden",background:"#EEE"}}>{gP>0&&<div style={{width:`${gP}%`,background:GREEN}}/>}{rP>0&&<div style={{width:`${rP}%`,background:RED}}/>}{nP>0&&<div style={{width:`${nP}%`,background:NEUTRAL}}/>}</div>)}

function MiniTile({s}){
const g=s.status==="green",r=s.status==="red";
const bg=g?GREEN_BG:r?RED_BG:NEUTRAL_BG;
const bc=g?GREEN:r?RED:NEUTRAL;
return(<div style={{background:bg,border:`1.5px solid ${bc}`,borderRadius:5,padding:"4px 2px 3px",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
<div style={{width:5,height:5,borderRadius:"50%",background:g?GREEN:r?RED:NEUTRAL}}/>
<div style={{fontSize:7.5,fontWeight:600,color:TEXT,textAlign:"center",lineHeight:1.1}}>{s.name}</div>
<div style={{fontSize:5.5,color:g?GREEN:r?RED:NEUTRAL}}>{g?`${s.time}`:r?"—":s.reason||"—"}</div>
</div>)}

function ClassroomDrillIn({cls,onBack}){
const cols=6;const rows=[];for(let i=0;i<cls.desks.length;i+=cols){rows.push(cls.desks.slice(i,i+cols))}
const g=cls.docked,r=cls.red,n=cls.neutral;
const pct=g+r>0?Math.round((g/(g+r))*100):100;
return(<div style={{display:"flex",flexDirection:"column",gap:8,flex:1,overflow:"hidden"}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<button onClick={onBack} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #E0E0E0",background:"#fff",color:"#888",fontSize:11,cursor:"pointer",fontFamily:"-apple-system,sans-serif"}}>← Back</button>
<div><div style={{fontSize:15,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>{cls.teacher} — {cls.subject}</div>
<div style={{fontSize:10,color:"#aaa"}}>Room {cls.room} · Period 3 · {cls.students} students</div></div>
</div>
<div style={{padding:"3px 10px",borderRadius:10,fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:cls.status==="alert"?RED_BG:cls.status==="free-time"?NEUTRAL_BG:GREEN_BG,color:cls.status==="alert"?RED:cls.status==="free-time"?NEUTRAL:GREEN}}>{cls.status==="free-time"?"Free Time":`${pct}%`}</div>
</div>
<div style={{display:"flex",gap:6,flexShrink:0}}>
{[{n:g,l:"Docked",c:GREEN,b:GREEN_BG},{n:r,l:"Not Docked",c:r>0?RED:NEUTRAL,b:r>0?RED_BG:NEUTRAL_BG},{n:n,l:"Released",c:NEUTRAL,b:NEUTRAL_BG}].map((x,i)=>(<div key={i} style={{flex:1,background:x.b,border:`1px solid ${x.c}22`,borderRadius:7,padding:"6px 8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:x.c,fontFamily:"'DM Sans',sans-serif"}}>{x.n}</div><div style={{fontSize:8,color:x.c,opacity:.8}}>{x.l}</div></div>))}
</div>
<div style={{flex:1,background:"#fff",borderRadius:8,border:"1px solid #E8E8E8",padding:"8px",display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{flex:1,display:"flex",flexDirection:"column",gap:3,justifyContent:"space-between"}}>
{rows.map((row,ri)=>(<div key={ri} style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:3,flex:1}}>{row.map((s,si)=><MiniTile key={si} s={s}/>)}</div>))}
</div>
<div style={{display:"flex",justifyContent:"center",gap:14,paddingTop:6,borderTop:"1px solid #F0F0F0",flexShrink:0}}>
{[{c:GREEN,l:"Docked"},{c:RED,l:"Not docked"},{c:NEUTRAL,l:"Released"}].map((x,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:3}}><div style={{width:6,height:6,borderRadius:"50%",background:x.c}}/><span style={{fontSize:8,color:"#888"}}>{x.l}</span></div>))}
</div>
</div>
</div>)}

function ClassCard({c,onClick}){const isA=c.status==="alert",isF=c.status==="free-time";const pct=c.red+c.docked>0?Math.round((c.docked/(c.docked+c.red))*100):100;return(<div onClick={onClick} style={{background:"#fff",border:`1.5px solid ${isA?RED+"44":isF?NEUTRAL+"44":GREEN+"33"}`,borderRadius:10,padding:"10px 12px",display:"flex",flexDirection:"column",gap:6,cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 10px rgba(0,0,0,.08)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:12.5,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>{c.teacher}</div><div style={{fontSize:10,color:"#aaa",marginTop:1}}>Rm {c.room} · {c.subject}</div></div><div style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:isA?RED_BG:isF?NEUTRAL_BG:GREEN_BG,color:isA?RED:isF?NEUTRAL:GREEN}}>{isF?"Free":`${pct}%`}</div></div><CompBar g={c.docked} r={c.red} n={c.neutral} total={c.students}/><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#aaa"}}><span>{c.docked} docked</span>{c.red>0&&<span style={{color:RED,fontWeight:600}}>{c.red} not docked</span>}{c.neutral>0&&<span>{c.neutral} released</span>}<span>{c.students} total</span></div></div>)}

function TeacherCard({t,onClick}){const isLow=t.avg<80,isMid=t.avg>=80&&t.avg<95;const color=isLow?RED:isMid?ORANGE:GREEN;const bg=isLow?RED_BG:isMid?ORANGE_BG:GREEN_BG;const ti=t.periods.reduce((a,p)=>a+p.inc.length,0);return(<div onClick={onClick} style={{background:"#fff",border:"1.5px solid #E8E8E8",borderRadius:10,padding:"10px 12px",cursor:"pointer",display:"flex",flexDirection:"column",gap:6,transition:"border-color .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor=color+"66"} onMouseLeave={e=>e.currentTarget.style.borderColor="#E8E8E8"}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:12.5,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>{t.name}</div><div style={{fontSize:10,color:"#aaa",marginTop:1}}>Rm {t.room} · {t.periods.length} periods</div></div><div style={{padding:"2px 8px",borderRadius:10,fontSize:11.5,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:bg,color}}>{t.avg}%</div></div><CompBar g={t.tD} r={t.tR} n={t.tN} total={t.tS}/><div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#aaa"}}><span>{t.tD} docked</span>{t.tR>0&&<span style={{color:RED,fontWeight:600}}>{t.tR} not docked</span>}<span>{t.tN} released</span>{ti>0&&<span style={{color:ORANGE,fontWeight:600}}>{ti} inc.</span>}</div></div>)}

function PeriodRow({p}){const color=p.pct===100?GREEN:p.pct>=90?ORANGE:RED;const bg=p.pct===100?GREEN_BG:p.pct>=90?ORANGE_BG:RED_BG;return(<div style={{background:"#FAFAFA",borderRadius:8,padding:"8px 10px",display:"flex",flexDirection:"column",gap:4}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:11,fontWeight:700,color:TEXT}}>Period {p.p}</span><span style={{fontSize:10,color:"#aaa",marginLeft:6}}>{p.sub} · {p.s} students</span></div><div style={{padding:"2px 7px",borderRadius:8,fontSize:10.5,fontWeight:700,background:bg,color}}>{p.pct}%</div></div><CompBar g={p.d} r={p.r} n={p.n} total={p.s} h={5}/>{p.inc.length>0&&(<div style={{display:"flex",flexDirection:"column",gap:3,marginTop:2}}>{p.inc.map((inc,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:6,background:inc.type==="Never docked"?RED_BG:inc.type==="Late dock"?ORANGE_BG:NEUTRAL_BG,borderRadius:5,padding:"4px 8px"}}><span style={{fontSize:8}}>{inc.type==="Never docked"?"🔴":inc.type==="Late dock"?"🟡":"⚪"}</span><span style={{fontSize:9.5,fontWeight:600,color:TEXT}}>{inc.stu}</span><span style={{fontSize:9,color:"#999"}}>{inc.type} · {inc.t}</span><span style={{fontSize:8.5,color:"#aaa",marginLeft:"auto"}}>{inc.det}</span></div>))}</div>)}</div>)}

function TeacherDetail({teacher,onBack}){return(<div style={{display:"flex",flexDirection:"column",gap:8,flex:1,overflow:"auto"}}><div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}><button onClick={onBack} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #E0E0E0",background:"#fff",color:"#888",fontSize:11,cursor:"pointer"}}>← Back</button><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>{teacher.name}</div><div style={{fontSize:10,color:"#aaa"}}>Rm {teacher.room} · Today · {teacher.periods.length} periods</div></div><div style={{padding:"3px 10px",borderRadius:10,fontSize:13,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:teacher.avg<80?RED_BG:teacher.avg<95?ORANGE_BG:GREEN_BG,color:teacher.avg<80?RED:teacher.avg<95?ORANGE:GREEN}}>{teacher.avg}% avg</div></div><CompBar g={teacher.tD} r={teacher.tR} n={teacher.tN} total={teacher.tS} h={8}/><div style={{display:"flex",flexDirection:"column",gap:6}}>{teacher.periods.map((p,i)=><PeriodRow key={i} p={p}/>)}</div></div>)}

</div>
<div style={{display:"flex",gap:6,flexShrink:0}}>
{[{n:CLS.filter(c=>c.docked+c.red>0).length,l:"Active",c:SAGE},{n:`${oP}%`,l:"Compliance",c:oP<80?RED:GREEN},{n:tD,l:"Docked",c:GREEN},{n:tR,l:"Not Docked",c:tR>0?RED:NEUTRAL}].map((x,i)=>(<div key={i} style={{flex:1,background:"#fff",borderRadius:8,padding:"7px 10px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:x.c,fontFamily:"'DM Sans',sans-serif"}}>{x.n}</div><div style={{fontSize:8,color:"#aaa"}}>{x.l}</div></div>))}
</div>
<div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,overflow:"auto"}}>
{CLS.map(c=><ClassCard key={c.id} c={c} onClick={()=>setDrillClass(c)}/>)}
</div>
</>)}

{/* DRILL INTO CLASSROOM */}
{tab==="realtime"&&drillClass&&(
<ClassroomDrillIn cls={drillClass} onBack={()=>setDrillClass(null)}/>
)}

{/* DAILY */}
{tab==="daily"&&!selTeacher&&(<>
<div style={{flexShrink:0}}><div style={{fontSize:17,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>Daily Report</div><div style={{fontSize:10,color:"#aaa"}}>Tuesday, March 24, 2026 · By teacher · Click for breakdown</div></div>
<div style={{flex:1,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,overflow:"auto"}}>
{TEACHERS_DAILY.map((t,i)=><TeacherCard key={i} t={t} onClick={()=>setSelTeacher(t)}/>)}
</div>
</>)}

{tab==="daily"&&selTeacher&&(
<TeacherDetail teacher={selTeacher} onBack={()=>setSelTeacher(null)}/>
)}

</div>
</div>)}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusPad — Teacher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#root{height:100%;overflow:hidden}
body{background:#F5F5F5;font-family:-apple-system,sans-serif}
@keyframes tutorialPulse {
  0%, 100% {
    box-shadow: 0 0 14px 4px rgba(34,197,94,.75), 0 0 0 3px rgba(34,197,94,.5);
    transform: scale(1.0);
  }
  50% {
    box-shadow: 0 0 32px 10px rgba(34,197,94,.95), 0 0 0 3px rgba(34,197,94,.85);
    transform: scale(1.04);
  }
}
.tutorial-pulse {
  outline: 2.5px solid rgba(34,197,94,.8);
  outline-offset: 3px;
  border-radius: 6px;
  animation: tutorialPulse 1.3s ease-in-out infinite;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState}=React;

const SAGE="#8B9A7B",GREEN="#4CAF50",GREEN_BG="#E8F5E9",RED="#E53935",RED_BG="#FFEBEE",NEUTRAL="#BDBDBD",NEUTRAL_BG="#F5F5F5",TEXT="#2D2D2D";

const NAMES=["Alex M","Jordan T","Casey R","Morgan L","Riley K","Taylor W","Avery B","Quinn S","Cameron J","Marcus J","Drew P","Sage D","Reese H","Parker N","Hayden C","Peyton F","Dakota G","Jamie V","Skyler Z","Finley A","Rowan E","Blake O","Emily W","Charlie I","Kendall U","Marley Q","Kai X","Nico Y","Jaden R","Micah S"];

function init(){return NAMES.map((name,i)=>({id:i,name,seat:`${Math.floor(i/6)+1}${String.fromCharCode(65+(i%6))}`,status:i===9?"red":i===22?"red":"green",time:i===9||i===22?null:`9:${30+Math.floor(Math.random()*4)}`,reason:null,isMarcus:i===9}))}

function Tile({s,onClick,pulse}){
const g=s.status==="green",r=s.status==="red",n=s.status==="neutral";
const bg=g?GREEN_BG:r?RED_BG:NEUTRAL_BG;
const bc=g?GREEN:r?RED:NEUTRAL;
return(
<div onClick={onClick} className={pulse?"tutorial-pulse":undefined} style={{
background:bg,border:`2px solid ${bc}`,borderRadius:8,
padding:"6px 3px 5px",display:"flex",flexDirection:"column",
alignItems:"center",gap:2,cursor:r?"pointer":"default",
transition:"all .35s ease",position:"relative",
}}>
<div style={{width:8,height:8,borderRadius:"50%",background:g?GREEN:r?RED:NEUTRAL,boxShadow:g?"0 0 6px rgba(76,175,80,.5)":r?"0 0 6px rgba(229,57,53,.5)":"none",transition:"all .35s"}}/>
<div style={{fontSize:10,fontWeight:600,color:TEXT,fontFamily:"-apple-system,sans-serif",textAlign:"center",lineHeight:1.15}}>{s.name}</div>
<div style={{fontSize:7,fontWeight:500,color:g?GREEN:r?RED:NEUTRAL,fontFamily:"-apple-system,sans-serif"}}>
{g?`Docked ${s.time||""}`:r?"Not docked":s.reason||"Released"}
</div>
<div style={{fontSize:6,color:"rgba(0,0,0,.2)",position:"absolute",top:2,right:3,fontFamily:"-apple-system,sans-serif"}}>{s.seat}</div>
</div>
)}

function ReasonPopup({student,onSelect,onClose,pulseReason}){
return(
<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,backdropFilter:"blur(4px)"}} onClick={onClose}>
<div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:14,padding:"20px 24px",width:300,boxShadow:"0 20px 60px rgba(0,0,0,.25)",display:"flex",flexDirection:"column",gap:14}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<div style={{width:36,height:36,borderRadius:"50%",background:RED_BG,border:`2px solid ${RED}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{width:8,height:8,borderRadius:"50%",background:RED}}/>
</div>
<div>
<div style={{fontSize:15,fontWeight:700,color:TEXT,fontFamily:"-apple-system,sans-serif"}}>{student.name}</div>
<div style={{fontSize:11,color:"#999"}}>Seat {student.seat} · Not docked</div>
</div>
</div>
<div style={{fontSize:12,fontWeight:600,color:"#666",fontFamily:"-apple-system,sans-serif"}}>Why is this student being released?</div>
<div style={{display:"flex",flexDirection:"column",gap:6}}>
{[
{label:"🏠 Absent",reason:"Absent"},
{label:"📱 Didn't bring phone",reason:"No phone"},
{label:"📋 Other",reason:"Released"},
].map((opt,i)=>(
<button key={i} onClick={()=>onSelect(opt.reason)} className={pulseReason===opt.reason?"tutorial-pulse":undefined} style={{
padding:"10px 16px",borderRadius:9,border:"1.5px solid #E0E0E0",
background:"#fff",color:TEXT,fontSize:13,fontWeight:500,
fontFamily:"-apple-system,sans-serif",cursor:"pointer",
textAlign:"left",display:"flex",alignItems:"center",gap:8,
transition:"all .12s",
}} onMouseEnter={e=>{e.currentTarget.style.background="#F8F8F8";e.currentTarget.style.borderColor="#CCC"}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="#E0E0E0"}}>
{opt.label}
</button>
))}
</div>
<button onClick={onClose} style={{padding:"8px",borderRadius:8,border:"none",background:"transparent",color:"#bbb",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"-apple-system,sans-serif"}}>Cancel</button>
</div>
</div>
)}

function TutorialPanel({step,total,texts,completion,onSkip,onClose}){
if(step===0||step==null)return null;
const isDone=step>total;
const text=isDone?completion:texts[step];
return(<div style={{position:"fixed",top:12,left:"50%",transform:"translateX(-50%)",width:420,maxWidth:"calc(100vw - 24px)",background:"#6B7D5E",color:"#fff",fontFamily:"'DM Sans',sans-serif",padding:12,borderRadius:10,zIndex:200,boxShadow:"0 6px 22px rgba(0,0,0,.3)"}}>
<div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".09em",color:"rgba(255,255,255,.65)",marginBottom:5}}>{isDone?"Complete":`Step ${step} of ${total}`}</div>
<div style={{fontSize:13,lineHeight:1.45,color:"#fff",paddingRight:92}}>{text}</div>
<button onClick={isDone?onClose:onSkip} style={{position:"absolute",bottom:8,right:12,fontSize:11,fontWeight:500,color:"rgba(255,255,255,.6)",cursor:"pointer",background:"none",border:"none",fontFamily:"'DM Sans',sans-serif",padding:"2px 4px"}} onMouseEnter={e=>e.currentTarget.style.color="rgba(255,255,255,.95)"} onMouseLeave={e=>e.currentTarget.style.color="rgba(255,255,255,.6)"}>{isDone?"Close":"Skip tutorial"}</button>
</div>);
}

const TUT_TEXT={
1:"Class just started. Marcus Johnson put his phone on the pad — click 'Student Docked Phone' to confirm.",
2:"Emily Warren is absent today. Click her red tile to release her.",
3:"Select 'Absent' since she's not in class.",
4:"100% compliance. When class ends, click 'Release All' for free time.",
};
const TUT_DONE="Demo complete. Click Reset Demo to run again.";

function Dashboard(){
const[students,setStudents]=useState(init);
const[released,setReleased]=useState(false);
const[popup,setPopup]=useState(null);
const[tutStep,setTutStep]=useState(1);

const greens=students.filter(s=>s.status==="green").length;
const reds=students.filter(s=>s.status==="red").length;
const neutrals=students.filter(s=>s.status==="neutral").length;
const active=greens+reds;
const pct=released?"—":active>0?Math.round((greens/active)*100):100;
const marcusIsRed=students.find(s=>s.isMarcus)?.status==="red";

const dockMarcus=()=>{setStudents(p=>p.map(s=>s.isMarcus?{...s,status:"green",time:"9:38"}:s));if(tutStep===1)setTutStep(2)};
const openPopup=(s)=>{setPopup(s);if(tutStep===2&&s.id===22)setTutStep(3)};
const releaseStudent=(id,reason)=>{setStudents(p=>p.map(s=>s.id===id?{...s,status:"neutral",reason}:s));setPopup(null);if(tutStep===3&&id===22)setTutStep(4)};
const releaseAll=()=>{setStudents(p=>p.map(s=>({...s,status:"neutral",reason:"Free time"})));setReleased(true);if(tutStep===4)setTutStep(5)};
const resetDemo=()=>{setStudents(init());setReleased(false);setPopup(null);setTutStep(1)};
const skipTut=()=>setTutStep(0);

const rows=[];for(let i=0;i<students.length;i+=6){rows.push(students.slice(i,i+6))}

return(
<div style={{height:"100vh",display:"flex",flexDirection:"column",background:"#F5F5F5",overflow:"hidden"}}>
<TutorialPanel step={tutStep} total={4} texts={TUT_TEXT} completion={TUT_DONE} onSkip={skipTut} onClose={skipTut}/>

{/* Nav */}
<div style={{background:"#fff",borderBottom:"1px solid #E8E8E8",padding:"8px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<a href="/" style={{fontSize:17,fontWeight:600,color:"#6B7D5E",textDecoration:"none",fontFamily:"'DM Sans',-apple-system,sans-serif",padding:"7px 16px",background:"#fff",border:"1.5px solid rgba(107,125,94,.35)",borderRadius:8,display:"inline-block",transition:"all .2s"}} onMouseEnter={e=>{e.currentTarget.style.background="#f5f7f3";e.currentTarget.style.borderColor="rgba(107,125,94,.7)"}} onMouseLeave={e=>{e.currentTarget.style.background="#fff";e.currentTarget.style.borderColor="rgba(107,125,94,.35)"}}>← Back to demo</a>
<div style={{width:1,height:16,background:"#E0E0E0",margin:"0 2px"}}/>
<div style={{width:24,height:24,borderRadius:6,background:SAGE,display:"flex",alignItems:"center",justifyContent:"center"}}><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
<span style={{fontSize:15,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>FocusPad</span>
<div style={{width:1,height:16,background:"#E0E0E0",margin:"0 2px"}}/>
<span style={{fontSize:11,color:"#aaa",fontWeight:500}}>Teacher Dashboard</span>
</div>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<span style={{fontSize:11,color:"#888"}}>Ms. Johnson</span>
<div style={{width:24,height:24,borderRadius:"50%",background:"#EDEDED",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>👩‍🏫</div>
</div>
</div>

{/* Content */}
<div style={{flex:1,padding:"10px 20px",display:"flex",flexDirection:"column",gap:8,overflow:"hidden"}}>

{/* Header row */}
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
<div>
<div style={{fontSize:17,fontWeight:700,color:TEXT,fontFamily:"'DM Sans',sans-serif"}}>AP US History</div>
<div style={{fontSize:11,color:"#aaa"}}>Period 3 · Room 214 · 9:30 – 10:45 AM · {students.length} students</div>
</div>
<div style={{display:"flex",gap:6}}>
{marcusIsRed&&!released&&(<button onClick={dockMarcus} className={tutStep===1?"tutorial-pulse":undefined} style={{padding:"6px 12px",borderRadius:8,border:"none",background:GREEN,color:"#fff",fontSize:11.5,fontWeight:600,fontFamily:"-apple-system,sans-serif",cursor:"pointer",display:"flex",alignItems:"center",gap:5,boxShadow:"0 2px 8px rgba(76,175,80,.3)"}}><span style={{fontSize:12}}>📱</span>Student Docked Phone</button>)}
{!released&&(<button onClick={releaseAll} className={tutStep===4?"tutorial-pulse":undefined} style={{padding:"6px 12px",borderRadius:8,border:`1.5px solid ${NEUTRAL}`,background:"#fff",color:"#777",fontSize:11.5,fontWeight:600,fontFamily:"-apple-system,sans-serif",cursor:"pointer",display:"flex",alignItems:"center",gap:5}}><span style={{fontSize:12}}>🔓</span>Release All — Free Time</button>)}
{released&&(<button onClick={resetDemo} style={{padding:"6px 12px",borderRadius:8,border:"1px solid #E0E0E0",background:"#fff",color:"#aaa",fontSize:11,fontWeight:500,fontFamily:"-apple-system,sans-serif",cursor:"pointer"}}>↺ Reset Demo</button>)}
</div>
</div>

{/* Stats */}
<div style={{display:"flex",gap:8,flexShrink:0}}>
{[
{n:greens,label:"Docked",color:released?NEUTRAL:GREEN,bg:released?NEUTRAL_BG:GREEN_BG},
{n:reds,label:"Not Docked",color:reds>0?RED:NEUTRAL,bg:reds>0?RED_BG:NEUTRAL_BG},
{n:neutrals,label:"Released",color:NEUTRAL,bg:NEUTRAL_BG},
{n:released?"—":`${pct}%`,label:"Compliance",color:released?NEUTRAL:TEXT,bg:"#fff"},
].map((item,i)=>(
<div key={i} style={{flex:1,background:item.bg,border:`1px solid ${typeof item.color==="string"?item.color:"#ddd"}22`,borderRadius:8,padding:"7px 10px",textAlign:"center",transition:"all .35s"}}>
<div style={{fontSize:20,fontWeight:700,color:item.color,fontFamily:"'DM Sans',sans-serif",transition:"color .35s"}}>{item.n}</div>
<div style={{fontSize:9,color:item.color,fontWeight:500,opacity:.8}}>{item.label}</div>
</div>
))}
</div>

{/* Alert or free time banner */}
{reds>0&&!released&&(
<div style={{background:RED_BG,border:`1px solid ${RED}33`,borderRadius:8,padding:"7px 12px",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
<div style={{width:6,height:6,borderRadius:"50%",background:RED,boxShadow:"0 0 5px rgba(229,57,53,.4)"}}/>
<span style={{fontSize:11,fontWeight:600,color:RED}}>{reds} student{reds>1?"s":""} not docked</span>
<span style={{fontSize:10,color:"rgba(229,57,53,.55)",marginLeft:2}}>— click red tile to release</span>
</div>
)}
{released&&(
<div style={{background:NEUTRAL_BG,border:`1px solid ${NEUTRAL}44`,borderRadius:8,padding:"7px 12px",display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
<span style={{fontSize:12}}>🔓</span>
<span style={{fontSize:11,fontWeight:600,color:"#777"}}>Free time — all phones released</span>
</div>
)}

{/* Classroom grid - fills remaining space */}
<div style={{flex:1,background:"#fff",borderRadius:10,border:"1px solid #E8E8E8",padding:"12px",display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{flex:1,display:"flex",flexDirection:"column",gap:4,justifyContent:"space-between"}}>
{rows.map((row,ri)=>(
<div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4,flex:1}}>
{row.map(s=>(
<Tile key={s.id} s={s} onClick={s.status==="red"?()=>openPopup(s):undefined} pulse={tutStep===2&&s.id===22}/>
))}
</div>
))}
</div>
<div style={{display:"flex",justifyContent:"center",gap:16,paddingTop:8,borderTop:"1px solid #F0F0F0",flexShrink:0}}>
{[{c:GREEN,l:"Phone on pad"},{c:RED,l:"No phone on pad"},{c:NEUTRAL,l:"Released"}].map((x,i)=>(
<div key={i} style={{display:"flex",alignItems:"center",gap:4}}>
<div style={{width:7,height:7,borderRadius:"50%",background:x.c}}/>
<span style={{fontSize:9.5,color:"#888"}}>{x.l}</span>
</div>
))}
</div>
</div>

</div>

{popup&&<ReasonPopup student={popup} onSelect={(reason)=>releaseStudent(popup.id,reason)} onClose={()=>setPopup(null)} pulseReason={tutStep===3?"Absent":null}/>}
</div>
)}

ReactDOM.render(<Dashboard/>,document.getElementById('root'));
</script>
</body>
</html>
